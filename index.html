<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0a0f1c">
  <title>مكتبة تمريض</title>
  <meta name="description" content="مكتبة تمريض — كل المحاضرات والملخصات وبنوك الأسئلة في مكان واحد">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header" id="appHeader">
    <span class="app-logo">📚</span>
    <div>
      <h1 class="app-name">مكتبة تمريض</h1>
      <p class="app-desc">المحاضرات · الملخصات · بنوك الأسئلة</p>
    </div>
  </header>

  <!-- Term Selector — only shows terms that have content, plus a dropdown for others -->
  <nav class="term-bar" id="termBar"></nav>

  <!-- Subject Chips -->
  <div class="subject-bar" id="subjectBar"></div>

  <!-- Controls -->
  <div class="ctrl-bar" id="ctrlBar" style="display:none;">
    <button class="ctrl-btn" id="btnToggle" type="button">📂 عرض الكل</button>
    <span class="ctrl-progress" id="ctrlProgress"></span>
  </div>

  <!-- Lectures -->
  <main class="lectures" id="lectures"></main>

  <!-- Empty state -->
  <div class="empty-box" id="emptyBox" style="display:none;">
    <div class="empty-icon">📭</div>
    <p class="empty-title">لسه مفيش محتوى هنا</p>
    <p class="empty-sub">هيتضاف قريب إن شاء الله</p>
  </div>

  <!-- Footer -->
  <footer class="app-footer">مكتبة تمريض &copy; 2026</footer>

  <script src="curriculum.js"></script>
  <script src="assets/js/portal.js"></script>
</body>
</html>
