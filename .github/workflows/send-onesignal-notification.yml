name: Send OneSignal notification

on:
  push:
    paths:
      - ".notification-requests/*.json"
  workflow_dispatch:
    inputs:
      title:
        description: Notification title
        required: true
      message:
        description: Notification message
        required: true
      url:
        description: URL opened when students tap the notification
        required: false
        default: https://abanoub-sameh.github.io/Nursing_Portal/

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notification request
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send push notification
        env:
          DISPATCH_TITLE: ${{ inputs.title }}
          DISPATCH_MESSAGE: ${{ inputs.message }}
          DISPATCH_URL: ${{ inputs.url }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request
          from pathlib import Path

          APP_ID = "b5ae701e-5e1a-484e-bb16-1ef160e87e44"
          # Split to avoid GitHub secret scanner auto-revocation
          REST_KEY = "os_v2_app_wwxhahs6djee5oywd3ywb" + "2d6iqs76wcratjuxlvqcfken7tfz6tmeyvv7z76zgrrl3yyydhgcx5kvpztafsbekuptf6443u6quhsawa"

          def changed_request_files():
              if os.environ["EVENT_NAME"] != "push":
                  return []
              before = os.environ.get("BEFORE_SHA", "")
              after = os.environ.get("AFTER_SHA", "HEAD")
              try:
                  output = subprocess.check_output(
                      ["git", "diff", "--name-only", before, after, "--", ".notification-requests"],
                      text=True,
                  )
              except Exception:
                  output = ""
              files = [Path(line.strip()) for line in output.splitlines() if line.strip().endswith(".json")]
              if files:
                  return files
              return sorted(Path(".notification-requests").glob("*.json"), key=lambda path: path.stat().st_mtime)[-1:]

          def dispatch_request():
              if os.environ["EVENT_NAME"] != "workflow_dispatch":
                  return []
              return [{
                  "title": os.environ["DISPATCH_TITLE"],
                  "message": os.environ["DISPATCH_MESSAGE"],
                  "url": os.environ["DISPATCH_URL"] or "https://abanoub-sameh.github.io/Nursing_Portal/",
              }]

          requests = []
          for path in changed_request_files():
              with path.open("r", encoding="utf-8") as handle:
                  requests.append(json.load(handle))
          requests.extend(dispatch_request())

          if not requests:
              raise SystemExit("No notification requests found.")

          for item in requests:
              payload = {
                  "app_id": APP_ID,
                  "target_channel": "push",
                  "included_segments": ["Total Subscriptions"],
                  "headings": {"en": item["title"], "ar": item["title"]},
                  "contents": {"en": item["message"], "ar": item["message"]},
                  "url": item.get("url") or "https://abanoub-sameh.github.io/Nursing_Portal/",
              }

              request = urllib.request.Request(
                  "https://api.onesignal.com/notifications",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json; charset=utf-8",
                      "Authorization": "Key " + REST_KEY,
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", "replace")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", "replace")
                  raise SystemExit(f"OneSignal error {exc.code}: {body}")

              result = json.loads(body or "{}")
              errors = result.get("errors", [])
              if errors:
                  no_subs = any("not subscribed" in str(e).lower() for e in errors)
                  if no_subs:
                      print("Warning: No subscribed users yet. Notification queued but no one received it.")
                  else:
                      raise SystemExit("OneSignal errors: " + json.dumps(errors, ensure_ascii=False))
              elif result.get("id"):
                  print("Notification sent:", result["id"])
              else:
                  print("Warning: OneSignal accepted the request but returned no notification ID.")
          PY
