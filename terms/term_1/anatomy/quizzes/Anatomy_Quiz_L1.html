<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anatomy Question Bank – Introduction to Human Anatomy</title>
    <meta name="description" content="Comprehensive question bank for Introduction to Human Anatomy - Nursing Faculty">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2236;
            --bg-card-hover: #1e2a42;
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.12);
            --success-border: rgba(16, 185, 129, 0.3);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.12);
            --error-border: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 32px 16px 24px;
            margin-bottom: 24px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99,102,241,0.12);
            border: 1px solid rgba(99,102,241,0.25);
            color: var(--accent-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .header-badge .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f1f5f9 0%, #a5b4fc 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(99,102,241,0.2);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-secondary);
        }

        .stat-value.correct { color: var(--success); }
        .stat-value.wrong { color: var(--error); }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
            font-weight: 600;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-section {
            margin-bottom: 24px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-header span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 50px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), #a78bfa);
            border-radius: 50px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
            border-radius: 50px;
        }

        /* ===== MODE SELECTOR ===== */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 100px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
        }

        .mode-btn:hover {
            border-color: rgba(99,102,241,0.3);
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: rgba(99,102,241,0.15);
            border-color: var(--accent-primary);
            color: var(--accent-secondary);
            box-shadow: 0 0 20px rgba(99,102,241,0.15);
        }

        /* ===== TOPIC FILTER ===== */
        .topic-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 24px;
            scrollbar-width: none;
        }
        .topic-filter::-webkit-scrollbar { display: none; }

        .topic-chip {
            white-space: nowrap;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .topic-chip:hover {
            border-color: rgba(99,102,241,0.3);
        }

        .topic-chip.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* ===== QUESTION CARD ===== */
        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-card:nth-child(1) { animation-delay: 0.05s; }
        .question-card:nth-child(2) { animation-delay: 0.1s; }
        .question-card:nth-child(3) { animation-delay: 0.15s; }
        .question-card:nth-child(4) { animation-delay: 0.2s; }
        .question-card:nth-child(5) { animation-delay: 0.25s; }

        .question-number {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-number .q-badge {
            background: rgba(99,102,241,0.15);
            color: var(--accent-secondary);
            padding: 3px 10px;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
        }

        .question-topic-badge {
            display: inline-block;
            background: rgba(139,92,246,0.12);
            color: #a78bfa;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 6px;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 18px;
            line-height: 1.6;
        }

        /* ===== OPTIONS ===== */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.02);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            font-family: inherit;
            line-height: 1.5;
            width: 100%;
        }

        .option-btn:hover:not(.disabled) {
            border-color: rgba(99,102,241,0.3);
            background: rgba(99,102,241,0.06);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .option-btn .option-letter {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: all 0.25s ease;
        }

        .option-btn:hover:not(.disabled) .option-letter {
            background: rgba(99,102,241,0.2);
            color: var(--accent-secondary);
        }

        .option-btn.correct {
            border-color: var(--success-border);
            background: var(--success-bg);
            color: var(--success);
        }
        .option-btn.correct .option-letter {
            background: rgba(16,185,129,0.2);
            color: var(--success);
        }

        .option-btn.wrong {
            border-color: var(--error-border);
            background: var(--error-bg);
            color: var(--error);
        }
        .option-btn.wrong .option-letter {
            background: rgba(239,68,68,0.2);
            color: var(--error);
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .option-btn.correct.disabled, .option-btn.wrong.disabled {
            opacity: 1;
        }

        /* ===== EXPLANATION ===== */
        .explanation {
            margin-top: 14px;
            padding: 14px 16px;
            background: rgba(99,102,241,0.06);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .explanation strong {
            color: var(--accent-secondary);
        }

        /* ===== PAGINATION / CONTROLS ===== */
        .controls-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,14,26,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .ctrl-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .ctrl-btn:hover {
            border-color: rgba(99,102,241,0.3);
            color: var(--text-primary);
        }

        .ctrl-btn.primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .ctrl-btn.primary:hover {
            background: var(--accent-secondary);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== RESULT SCREEN ===== */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .result-screen .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 6px solid var(--accent-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            position: relative;
        }

        .result-screen .score-circle::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(99,102,241,0.15);
        }

        .score-percent {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-secondary);
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .result-message {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .result-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .result-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
        }

        .result-stat .val {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .result-stat .lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* ===== SEARCH ===== */

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ===== SHUFFLE BTN ===== */
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: rgba(99,102,241,0.3);
            color: var(--text-primary);
            background: rgba(99,102,241,0.08);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .app-container { padding: 10px; padding-bottom: 90px; }
            .header h1 { font-size: 1.4rem; }
            .question-card { padding: 18px; }
            .stat-value { font-size: 1.25rem; }
            .stats-bar { gap: 6px; }
            .stat-card { padding: 10px 6px; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Hidden */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-badge"><span class="pulse"></span> abanoub sameh </div>
            <h1>🩺  Anatomy Question Bank </h1>
           
            <div class="arabic-notice" style="margin-top: 16px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.25); color: #f59e0b; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 600; direction: rtl; display: inline-flex; align-items: center; gap: 8px; justify-content: center; width: 100%;">
                ⚠️ الكويز ده علي اول محاضره في مادة الاناتومي.
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-value" id="totalQ">0</div>
                <div class="stat-label">Questions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value correct" id="correctCount">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value wrong" id="wrongCount">0</div>
                <div class="stat-label">Wrong</div>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-section">
            <div class="progress-header">
                <span>Progress</span>
                <span id="progressText">0 / 0</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="practice" id="modePractice">📝 Practice</button>
            <button class="mode-btn" data-mode="exam" id="modeExam">🎯 Exam Mode</button>
            <button class="mode-btn" data-mode="review" id="modeReview">📖 Review Wrong</button>
        </div>

        <!-- Topic Filter -->
        <div class="topic-filter" id="topicFilter"></div>

        <!-- Action Row -->
        <div class="action-row">
            <button class="action-btn" id="shuffleBtn" onclick="shuffleQuestions()">🔀 Shuffle</button>
            <button class="action-btn" id="resetBtn" onclick="resetQuiz()">🔄 Reset All</button>
            <button class="action-btn" id="showAllBtn" onclick="showAllQuestions()">📋 Show All</button>
        </div>

        <!-- Questions Container -->
        <div id="questionsContainer"></div>

        <!-- Result Screen -->
        <div id="resultScreen" class="result-screen hidden"></div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-bar" id="controlsBar">
        <button class="ctrl-btn" id="prevBtn" onclick="changePage(-1)">◀ Prev</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button class="ctrl-btn" id="nextBtn" onclick="changePage(1)">Next ▶</button>
        <button class="ctrl-btn primary" id="finishBtn" onclick="showResults()" class="hidden">🏁 Finish</button>
    </div>

    <script>
    // ========================
    // QUESTION BANK DATABASE
    // ========================
    const allQuestions = [
        // ===== TOPIC: DEFINITION & BASICS =====
        {
            id: 1,
            topic: "Definition & Basics",
            question: "What is the definition of human anatomy?",
            options: [
                "The study of body functions and processes",
                "The study of the structure of the body and the relationship of its constituent parts to each other",
                "The study of diseases and their treatments",
                "The study of cells under microscope"
            ],
            correct: 1,
            explanation: "Human anatomy is the study of the structure of the body and the relationship of its constituent parts to each other."
        },
        {
            id: 2,
            topic: "Definition & Basics",
            question: "What is the basic unit of the human body?",
            options: [
                "Tissue",
                "Organ",
                "The cell",
                "System"
            ],
            correct: 2,
            explanation: "The cell is the basic unit of the human body."
        },
        {
            id: 3,
            topic: "Definition & Basics",
            question: "What is the correct hierarchy of structural organization in the body?",
            options: [
                "Tissues → Cells → Organs → Systems",
                "Cells → Organs → Tissues → Systems",
                "Cells → Tissues → Organs → Systems",
                "Systems → Organs → Tissues → Cells"
            ],
            correct: 2,
            explanation: "The correct hierarchy is: Cells → Tissues → Organs → Systems. Cells group into tissues, tissues form organs, and organs form systems."
        },
        {
            id: 4,
            topic: "Definition & Basics",
            question: "What are tissues?",
            options: [
                "Single cells that perform a specific function",
                "Organized groups of cells similar both in appearance and in function",
                "Groups of organs that work together",
                "The intercellular substance between cells"
            ],
            correct: 1,
            explanation: "Tissues are organized groups of cells similar both in appearance and in function."
        },
        {
            id: 5,
            topic: "Definition & Basics",
            question: "The human body consists of various types of specialized cells and a varying amount of:",
            options: [
                "Blood plasma",
                "Hormones",
                "Intercellular substance",
                "Enzymes"

    // ========================
    // APP STATE
    // ========================
    let state = {
        mode: 'practice', // practice, exam, review
        currentPage: 0,
        questionsPerPage: 5,
        activeTopic: 'All',
        answered: {},    // { questionId: selectedIndex }
        searchQuery: '',
        shuffled: false,
        showAll: false,
    };

    let filteredQuestions = [...allQuestions];

    // ========================
    // INIT
    // ========================
    function init() {
        // Load saved state
        const saved = localStorage.getItem('anatomy_quiz_state');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                state.answered = parsed.answered || {};
            } catch(e) {}
        }

        buildTopicFilter();
        updateStats();
        filterAndRender();

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;
                state.currentPage = 0;
                state.showAll = false;
                filterAndRender();
            });
        });
    }

    // ========================
    // TOPICS
    // ========================
    function getTopics() {
        const topics = new Set();
        allQuestions.forEach(q => topics.add(q.topic));
        return ['All', ...Array.from(topics)];
    }

    function buildTopicFilter() {
        const container = document.getElementById('topicFilter');
        const topics = getTopics();
        container.innerHTML = topics.map(t => 
            `<button class="topic-chip ${t === state.activeTopic ? 'active' : ''}" onclick="selectTopic('${t}')">${t}</button>`
        ).join('');
    }

    function selectTopic(topic) {
        state.activeTopic = topic;
        state.currentPage = 0;
        state.showAll = false;
        buildTopicFilter();
        filterAndRender();
    }

    // ========================
    // FILTER & RENDER
    // ========================
    function filterAndRender() {
        let qs = [...allQuestions];

        // Topic filter
        if (state.activeTopic !== 'All') {
            qs = qs.filter(q => q.topic === state.activeTopic);
        }

        // Review mode: only wrong answers
        if (state.mode === 'review') {
            qs = qs.filter(q => {
                const ans = state.answered[q.id];
                return ans !== undefined && ans !== q.correct;
            });
        }

        filteredQuestions = qs;
        renderQuestions();
        updateStats();
        updatePagination();

        // Hide result screen
        document.getElementById('resultScreen').classList.add('hidden');
        document.getElementById('questionsContainer').classList.remove('hidden');
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        const start = state.showAll ? 0 : state.currentPage * state.questionsPerPage;
        const end = state.showAll ? filteredQuestions.length : start + state.questionsPerPage;
        const pageQuestions = filteredQuestions.slice(start, end);

        if (pageQuestions.length === 0) {
            container.innerHTML = `
                <div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
                    <div style="font-size:3rem;margin-bottom:16px">📭</div>
                    <div style="font-size:1.1rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px">
                        ${state.mode === 'review' ? 'No wrong answers to review!' : 'No questions found'}
                    </div>
                    <div style="font-size:0.85rem">
                        ${state.mode === 'review' ? 'Great job! Try answering more questions first.' : 'Try a different topic.'}
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = pageQuestions.map((q, idx) => {
            const answered = state.answered[q.id] !== undefined;
            const selectedIdx = state.answered[q.id];
            const isExamMode = state.mode === 'exam';

            const letters = ['A', 'B', 'C', 'D'];

            return `
                <div class="question-card" id="q${q.id}">
                    <div class="question-number">
                        <span class="q-badge">Q${q.id}</span>
                        <span class="question-topic-badge">${q.topic}</span>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="options-list">
                        ${q.options.map((opt, oi) => {
                            let cls = 'option-btn';
                            if (answered && !isExamMode) {
                                cls += ' disabled';
                                if (oi === q.correct) cls += ' correct';
                                else if (oi === selectedIdx) cls += ' wrong';
                            } else if (answered && isExamMode) {
                                cls += ' disabled';
                                if (oi === selectedIdx) cls += ' selected-exam';
                            }
                            return `
                                <button class="${cls}" onclick="selectAnswer(${q.id}, ${oi})" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letters[oi]}</span>
                                    <span>${opt}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    ${answered && !isExamMode ? `
                        <div class="explanation">
                            <strong>${selectedIdx === q.correct ? '✅ Correct!' : '❌ Incorrect.'}</strong> ${q.explanation}
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    // ========================
    // ANSWER HANDLER
    // ========================
    function selectAnswer(qId, optIdx) {
        if (state.answered[qId] !== undefined) return;

        state.answered[qId] = optIdx;
        saveState();
        
        // Re-render to show feedback
        if (state.mode !== 'exam') {
            renderQuestions();
        } else {
            // In exam mode, just disable the buttons and mark selected
            const card = document.getElementById(`q${qId}`);
            const buttons = card.querySelectorAll('.option-btn');
            buttons.forEach((btn, idx) => {
                btn.classList.add('disabled');
                btn.disabled = true;
                if (idx === optIdx) {
                    btn.style.borderColor = 'rgba(99,102,241,0.5)';
                    btn.style.background = 'rgba(99,102,241,0.1)';
                    btn.style.color = 'var(--accent-secondary)';
                }
            });
        }

        updateStats();
        updatePagination();
    }

    // ========================
    // STATS
    // ========================
    function updateStats() {
        const totalAnswered = Object.keys(state.answered).length;
        let correct = 0;
        let wrong = 0;

        Object.entries(state.answered).forEach(([qId, ans]) => {
            const q = allQuestions.find(q => q.id == qId);
            if (q) {
                if (ans === q.correct) correct++;
                else wrong++;
            }
        });

        document.getElementById('totalQ').textContent = allQuestions.length;
        document.getElementById('correctCount').textContent = correct;
        document.getElementById('wrongCount').textContent = wrong;

        const pct = allQuestions.length > 0 ? Math.round((totalAnswered / allQuestions.length) * 100) : 0;
        document.getElementById('progressText').textContent = `${totalAnswered} / ${allQuestions.length}`;
        document.getElementById('progressFill').style.width = pct + '%';

        // Show finish button when enough answered
        const finishBtn = document.getElementById('finishBtn');
        if (totalAnswered >= allQuestions.length * 0.5) {
            finishBtn.classList.remove('hidden');
        }
    }

    // ========================
    // PAGINATION
    // ========================
    function updatePagination() {
        const totalPages = state.showAll ? 1 : Math.max(1, Math.ceil(filteredQuestions.length / state.questionsPerPage));
        const current = state.showAll ? 1 : state.currentPage + 1;

        document.getElementById('pageInfo').textContent = `${current} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = state.showAll || state.currentPage === 0;
        document.getElementById('nextBtn').disabled = state.showAll || state.currentPage >= totalPages - 1;
    }

    function changePage(dir) {
        const totalPages = Math.ceil(filteredQuestions.length / state.questionsPerPage);
        state.currentPage = Math.max(0, Math.min(totalPages - 1, state.currentPage + dir));
        renderQuestions();
        updatePagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ========================
    // ACTIONS
    // ========================
    function shuffleQuestions() {
        for (let i = allQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
        }
        // Also shuffle options for each question
        allQuestions.forEach(q => {
            const correctOption = q.options[q.correct];
            const shuffledOptions = [...q.options];
            for (let i = shuffledOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
            }
            q.options = shuffledOptions;
            q.correct = shuffledOptions.indexOf(correctOption);
        });
        state.currentPage = 0;
        state.showAll = false;
        filterAndRender();
    }

    function resetQuiz() {
        if (!confirm('Are you sure you want to reset all answers?')) return;
        state.answered = {};
        state.currentPage = 0;
        state.showAll = false;
        localStorage.removeItem('anatomy_quiz_state');
        filterAndRender();
    }

    function showAllQuestions() {
        state.showAll = !state.showAll;
        const btn = document.getElementById('showAllBtn');
        btn.textContent = state.showAll ? '📄 Paginate' : '📋 Show All';
        filterAndRender();
    }

    // ========================
    // RESULTS
    // ========================
    function showResults() {
        const totalAnswered = Object.keys(state.answered).length;
        let correct = 0;
        let wrong = 0;

        Object.entries(state.answered).forEach(([qId, ans]) => {
            const q = allQuestions.find(q => q.id == qId);
            if (q) {
                if (ans === q.correct) correct++;
                else wrong++;
            }
        });

        const pct = totalAnswered > 0 ? Math.round((correct / totalAnswered) * 100) : 0;
        let message = '', sub = '';
        if (pct >= 90) { message = '🌟 Outstanding!'; sub = 'You truly mastered this material!'; }
        else if (pct >= 75) { message = '👏 Great Job!'; sub = 'You have a strong understanding!'; }
        else if (pct >= 60) { message = '👍 Good Work!'; sub = 'A bit more review and you\'ll be excellent!'; }
        else if (pct >= 40) { message = '📚 Keep Studying!'; sub = 'Review the wrong answers and try again.'; }
        else { message = '💪 Don\'t Give Up!'; sub = 'Use the Review Wrong mode to focus on weak areas.'; }

        const circleColor = pct >= 75 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--error)';

        document.getElementById('questionsContainer').classList.add('hidden');
        const resultScreen = document.getElementById('resultScreen');
        resultScreen.classList.remove('hidden');
        resultScreen.innerHTML = `
            <div class="score-circle" style="border-color: ${circleColor}">
                <div class="score-percent" style="color: ${circleColor}">${pct}%</div>
                <div class="score-label">Score</div>
            </div>
            <div class="result-message">${message}</div>
            <div class="result-sub">${sub}</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="val" style="color:var(--text-primary)">${totalAnswered}</div>
                    <div class="lbl">Answered</div>
                </div>
                <div class="result-stat">
                    <div class="val" style="color:var(--success)">${correct}</div>
                    <div class="lbl">Correct</div>
                </div>
                <div class="result-stat">
                    <div class="val" style="color:var(--error)">${wrong}</div>
                    <div class="lbl">Wrong</div>
                </div>
            </div>
            <button class="ctrl-btn primary" onclick="reviewWrong()" style="margin:8px;padding:12px 28px">📖 Review Wrong Answers</button>
            <button class="ctrl-btn" onclick="backToQuiz()" style="margin:8px;padding:12px 28px">◀ Back to Quiz</button>
            <button class="ctrl-btn" onclick="resetQuiz()" style="margin:8px;padding:12px 28px">🔄 Reset & Retry</button>
        `;
    }

    function reviewWrong() {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('modeReview').classList.add('active');
        state.mode = 'review';
        state.currentPage = 0;
        state.showAll = false;
        filterAndRender();
    }

    function backToQuiz() {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('modePractice').classList.add('active');
        state.mode = 'practice';
        state.currentPage = 0;
        state.showAll = false;
        filterAndRender();
    }

    // ========================
    // PERSISTENCE
    // ========================
    function saveState() {
        localStorage.setItem('anatomy_quiz_state', JSON.stringify({
            answered: state.answered
        }));
    }

    // ========================
    // START
    // ========================
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
